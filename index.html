<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fund Returns Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="page-title">
      <img src="bear.jpg" alt="Bear icon" class="title-icon" />
      <h1>My Fund Returns</h1>
      <img src="bull.jpg" alt="Bull icon" class="title-icon" />
    </div>

    <div class="controls">
      <button class="range-button" onclick="setRange(7, this)" disabled>1W</button>
      <button class="range-button" onclick="setRange(30, this)" disabled>1M</button>
      <button class="range-button" onclick="setRange(180, this)" disabled>6M</button>
      <button class="range-button" onclick="setRange(365, this)" disabled>1Y</button>
      <button class="range-button active" onclick="setRange(null, this)" disabled>All</button>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">1W</div>
        <div class="summary-value" id="summary-7">--</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">1M</div>
        <div class="summary-value" id="summary-30">--</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">6M</div>
        <div class="summary-value" id="summary-180">--</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">1Y</div>
        <div class="summary-value" id="summary-365">--</div>
      </div>
    </div>

    <div class="chart-tabs">
      <button class="tab-button active" data-tab="nav">NAV</button>
      <button class="tab-button" data-tab="percentage">% Return</button>
    </div>

    <div class="tab-panels">
      <div class="chart-card tab-panel active" id="nav-panel">
        <h2>NAV</h2>
        <canvas id="navChart"></canvas>
      </div>
      <div class="chart-card tab-panel" id="percentage-panel" hidden>
        <h2>Percentage Return</h2>
        <canvas id="percentageChart"></canvas>
      </div>
    </div>
 
  </div>

  <script>
    // Load data from separate file
    let rawData = [];
    let dataLoaded = false;

    fetch('returns.json')
      .then(response => response.json())
      .then(data => {
        rawData = data;
        dataLoaded = true;
        renderCharts(rawData);
        renderSummaryBoxes();
        // Enable range buttons
        document.querySelectorAll('.range-button').forEach(btn => btn.disabled = false);
      })
      .catch(error => console.error('Error loading data:', error));

    let navChart;
    let percentageChart;

    function calculatePeriodReturn(data) {
      if (!data || data.length < 2) return null;

      const first = data[0];
      const last = data[data.length - 1];

      if (!first.nav || !last.nav) return null;

      const pct = ((last.nav - first.nav) / first.nav) * 100;
      return Number(pct.toFixed(2));
    }

    function renderSummaryBoxes() {
      const periods = [
        { id: 'summary-7', days: 7 },
        { id: 'summary-30', days: 30 },
        { id: 'summary-180', days: 180 },
        { id: 'summary-365', days: 365 }
      ];

      periods.forEach(({ id, days }) => {
        const valueEl = document.getElementById(id);
        if (!valueEl) return;

        const filtered = filterData(days);
        const value = calculatePeriodReturn(filtered);

        if (value === null) {
          valueEl.textContent = '--';
          valueEl.className = 'summary-value';
          return;
        }

        const formatted = `${value > 0 ? '+' : ''}${value.toFixed(2)}%`;
        valueEl.textContent = formatted;
        valueEl.className = 'summary-value';
        if (value > 0) valueEl.classList.add('positive');
        else if (value < 0) valueEl.classList.add('negative');
      });
    }

    function filterData(days) {
      if (!days) return rawData;

      const now = new Date(rawData[rawData.length - 1].date);
      const cutoff = new Date(now);
      cutoff.setDate(cutoff.getDate() - days);

      return rawData.filter(d => new Date(d.date) >= cutoff);
    }

    function renderCharts(filteredData) {
      const labels = filteredData.map(d => d.date);
      const navValues = filteredData.map(d => d.nav);
      const percentageValues = filteredData.map(d => d.percentage_return);

      if (navChart) navChart.destroy();
      if (percentageChart) percentageChart.destroy();

      const navCtx = document.getElementById('navChart').getContext('2d');
      const percentageCtx = document.getElementById('percentageChart').getContext('2d');

      navChart = new Chart(navCtx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'NAV ($)',
            data: navValues,
            borderWidth: 2,
            borderColor: '#007bff',
            backgroundColor: 'rgba(0, 123, 255, 0.1)',
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: { title: { display: true, text: 'Date' } },
            y: { beginAtZero: false, title: { display: true, text: 'NAV ($)' } }
          }
        }
      });

      percentageChart = new Chart(percentageCtx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Percentage Return (%)',
            data: percentageValues,
            borderWidth: 2,
            borderColor: '#28a745',
            backgroundColor: 'rgba(40, 167, 69, 0.1)',
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          scales: {
            x: { title: { display: true, text: 'Date' } },
            y: { beginAtZero: false, title: { display: true, text: 'Percentage Return (%)' } }
          }
        }
      });
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });

      document.querySelectorAll('.tab-panel').forEach(panel => {
        const isActive = panel.id === `${tabName}-panel`;
        panel.classList.toggle('active', isActive);
        panel.hidden = !isActive;
      });

      requestAnimationFrame(() => {
        if (navChart) navChart.resize();
        if (percentageChart) percentageChart.resize();
      });
    }

    function setRange(days, button) {
      if (!dataLoaded) return;

      const buttons = document.querySelectorAll('.range-button');
      buttons.forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');

      const filtered = filterData(days);
      renderCharts(filtered);
      renderSummaryBoxes();
    }

    document.querySelectorAll('.tab-button').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    // Initial render is now handled in the fetch
  </script>
</body>
</html>
